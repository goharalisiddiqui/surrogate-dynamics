debug: False
outpath: ./train_runs/encoder/bge
outfolder: run
overwrite: True
nexp: 3
output_to_file: True

# Trainer Settings
nepochs: 2000
weight_decay: 0.0
wandb: True
wandb_project: SurrogateDynamics-Encoder
wandb_entity: goharalisiddiqui-tum
lrate: 0.001


scheduler: True
scheduler_args:
    factor: 0.5
    patience: 20
    cooldown: 10
    min_lr: 0.00000001
early_stopping: True
early_stopping_args:
    patience: 50

load_datamodule: ./dmods/encoder/ver_1
datamodule_args:
    batch_size: 2048              # Training batch size
    val_batch_size: 2048           # Validation batch size
    test_batch_size: 2048          # Test batch size
    num_workers: 4              # DataLoader workers

network_type: BGE
network_args:
    loss_weights: [0.05, 0.05, 0.45, 0.45] # bond, angle, dihedral_cos, dihedral_sin
    encoder_args:
        node_embed_dim : 8
        edge_embed_dim : 8
        hidden_dim : 256
        num_layers : 3
        heads : 2
        set2set_steps : 3
        latent_dim : 128
        dropout : 0.0

    decoder_args:
        template_khop: 2
        node_embed_dim: 8
        edge_embed_dim: 8
        hidden_dim: 256
        num_layers: 3
        heads: 2
        dropout_mp: 0.0
        dropout_mlp: 0.0
        final_mlp_layers: 2
        rbf_dim: 16
        rbf_min: 0.0
        rbf_max: 4.0
        rbf_gamma: 10.0

test_plotter_type: ALA2
test_plotter_args:
    labels_selection_map:
        phi_2_cos: [dihedral_cos, 6]
        phi_2_sin: [dihedral_sin, 6]
        psi_2_cos: [dihedral_cos, 10]
        psi_2_sin: [dihedral_sin, 10]