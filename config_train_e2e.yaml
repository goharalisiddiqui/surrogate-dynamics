debug: False
outpath: ./train_runs/tft_e2e_gaussian_test
outfolder: run
overwrite: False
nexp: 1
output_to_file: True

# Trainer Settings
nepochs: 5000
weight_decay: 0.0
nolog: False
wandb: True
wandb_project: SurrogateDynamics
wandb_entity: goharalisiddiqui-tum
scheduler: True
lrate: 0.01
loss_prop_weight: 0.001
loss_rec_weight: 1.0
loss_e2e_weight: 0.0
loss_encdec_weights: [0.1, 0.1, 0.9, 0.9] # bond, angle, dihedral_cos, dihedral_sin
likelihood: Gaussian
likelihood_args:
    prior_mu: 0.0
    prior_sigma: 1.0
    prior_strength: 0.4
    beta_nll: 0.1 # Weight for NLL loss. [0,1] 0 -> MSE, 1 -> NLL, High values means high weight on low error points
# likelihood: QuantileRegression
# likelihood_args:
#     quantiles: [0.1,0.15,0.2,0.5,0.8,0.85,0.9]
data_analyser: ala2

dynamics_name: XTC_graph
data_args:
    xtcfile: ./data_generation/ala2/solvated/300K/ala2_100ns/md.xtc
    tprfile: ./data_generation/ala2/solvated/300K/initialization/tpr_initial.tpr
    selection: "(resname ALA or resname ACE or resname NME) and not element H"
    train_size : 100
    batch_size : 16
    validation_size : 16
    val_batch_size : 16
    dataset_type : "GRAPH"
    num_workers : 4
    norm_type : "minmax"

encoder_args:
    node_feat : 3 # Should come from data
    edge_feat : 3 # Should come from data
    node_embed_dim : 8
    edge_embed_dim : 8
    hidden_dim : 128
    num_layers : 2
    heads : 2
    set2set_steps : 3
    latent_dim : 128
    dropout : 0.0

decoder_args:
    template_khop: 2
    node_embed_dim: 8
    edge_embed_dim: 8
    hidden_dim: 128
    num_layers: 2
    heads: 2
    dropout_mp: 0.0
    dropout_mlp: 0.0
    final_mlp_layers: 2
    rbf_dim: 16
    rbf_min: 0.0
    rbf_max: 4.0
    rbf_gamma: 10.0

propagator_name: BGE_TFT
propagator_args:
    input_chunk_length: 150
    output_chunk_length: 15
    hidden_dim: 128
    lstm_layers: 1
    num_attention_heads: 1
    dropout: 0.01