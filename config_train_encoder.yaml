debug: False
outpath: ./train_runs/edge_updates/bge
outfolder: run
overwrite: False
nexp: 1
output_to_file: True

# Trainer Settings
nepochs: 2000
weight_decay: 0.0
wandb: True
wandb_project: SurrogateDynamics
wandb_entity: goharalisiddiqui-tum
scheduler: True
lrate: 0.001
loss_encdec_weights: [0.1, 0.1, 0.9, 0.9] # bond, angle, dihedral_cos, dihedral_sin
data_analyser: ala2

scheduler: True
scheduler_args:
    factor: 0.5
    pateience: 20
    cooldown: 20
    min_lr: 0.00000001
early_stopping: False
early_stopping_args:
    patience: 50

data_name: XTC
data_args:
    xtcfile: ./data_generation/ala2/solvated/300K/ala2_100ns/md.xtc
    tprfile: ./data_generation/ala2/solvated/300K/initialization/tpr_initial.tpr
    selection: "(resname ALA or resname ACE or resname NME) and not element H"
    dataset_size: 10000
    sequential: False
    train_size : 8000
    batch_size : 256
    validation_size : 2000
    val_batch_size : 256
    dataset_type : "GRAPH"
    num_workers : 4
    norm_type : "minmax"
    test_full_dataset : True

network_name: BGE
encoder_args:
    node_feat : 3 # Should come from data
    edge_feat : 3 # Should come from data
    node_embed_dim : 8
    edge_embed_dim : 8
    hidden_dim : 256
    num_layers : 3
    heads : 2
    set2set_steps : 3
    latent_dim : 128
    dropout : 0.0

decoder_args:
    template_khop: 2
    node_embed_dim: 8
    edge_embed_dim: 8
    hidden_dim: 256
    num_layers: 3
    heads: 2
    dropout_mp: 0.0
    dropout_mlp: 0.0
    final_mlp_layers: 2
    rbf_dim: 16
    rbf_min: 0.0
    rbf_max: 4.0
    rbf_gamma: 10.0