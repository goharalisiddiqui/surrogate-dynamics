debug: False
outpath: ./train_runs/tft
outfolder: run
overwrite: True
nexp: 1
output_to_file: True

# Trainer Settings
nepochs: 5
weight_decay: 0.0
wandb: False
wandb_project: SurrogateDynamics
wandb_entity: goharalisiddiqui-tum
scheduler: True
lrate: 0.01
likelihood: Gaussian
likelihood_args:
    prior_mu: 0.0
    prior_sigma: 1.0
    prior_strength: 0.4
    beta_nll: 0.1 # Weight for NLL loss. [0,1] 0 -> MSE, 1 -> NLL, High values means high weight on low error points
# likelihood: QuantileRegression
# likelihood_args:
#     quantiles: [0.1,0.15,0.2,0.5,0.8,0.85,0.9]
data_analyser: ala2

dynamics_name: XTC_graph
data_args:
    xtcfile: ./data_generation/ala2/solvated/300K/ala2_100ns/md.xtc
    tprfile: ./data_generation/ala2/solvated/300K/initialization/tpr_initial.tpr
    selection: "(resname ALA or resname ACE or resname NME) and not element H"
    train_size : 10
    batch_size : 10
    validation_size : 2
    val_batch_size : 2
    dataset_type : "GRAPH"
    num_workers : 4
    norm_type : "minmax"

propagator_name: TFT
encdec_name: BGE
encdec_ckpt: /mnt/projects/sne/Gohar/12.PROJECT_Surrogate_Dynamics/surrogate-dynamics/train_runs/bge/run_test_1/checkpoints/best.ckpt
propagator_args:
    input_chunk_length: 150
    output_chunk_length: 15
    hidden_dim: 128
    lstm_layers: 1
    num_attention_heads: 1
    dropout: 0.01